<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нумерологічне Колесо</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background: #0d0d0d;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    padding: 32px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 40%, rgba(255,180,0,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 900px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.12em;
    color: #f5c842;
    text-shadow: 0 0 24px rgba(245,200,66,0.4);
  }

  /* ── Input panel ──────────────────────────────────── */
  .input-panel {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 14px;
    padding: 16px 24px;
    width: 100%;
    max-width: 480px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .input-panel label {
    color: #aaa;
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .input-panel input[type="text"] {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    padding: 8px 14px;
    width: 160px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: .05em;
  }
  .input-panel input[type="text"]:focus { border-color: #f5c842; }

  .btn-calc {
    background: #f5c842;
    border: none;
    border-radius: 8px;
    color: #0d0d0d;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: .08em;
    padding: 9px 22px;
    transition: background .2s, transform .1s;
  }
  .btn-calc:hover  { background: #ffd966; }
  .btn-calc:active { transform: scale(.97); }

  .err-msg {
    color: #e84040;
    font-size: 0.82rem;
    text-align: center;
    min-height: 18px;
  }

  /* ── Main layout: wheel + cards ───────────────────── */
  .main-row {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  /* ── Wheel ────────────────────────────────────────── */
  .wheel-wrap {
    position: relative;
    width: 380px;
    height: 380px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 36px rgba(245,200,66,0.22));
  }
  .wheel-wrap svg { width: 100%; height: 100%; overflow: visible; }

  /* ── Cards ────────────────────────────────────────── */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 240px;
    max-width: 340px;
    flex: 1;
  }

  .card {
    background: #161616;
    border: 1px solid #252525;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color .3s, background .3s;
  }
  .card.active {
    border-color: var(--card-color);
    background: #1b1b1b;
    box-shadow: 0 0 18px -4px var(--card-color);
  }

  .card-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--card-color);
    min-width: 36px;
    text-align: center;
    line-height: 1;
  }

  .card-body { flex: 1; }

  .card-title {
    font-size: 0.78rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .card-name {
    font-weight: 700;
    font-size: 0.95rem;
    color: #ddd;
    line-height: 1.2;
  }

  .card-formula {
    font-size: 0.75rem;
    color: #666;
    margin-top: 2px;
  }

  .card-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--card-color);
    min-width: 36px;
    text-align: right;
    opacity: 0;
    transition: opacity .4s;
  }
  /* ── Analysis panel ───────────────────────────────────── */
  .analysis {
    width: 100%;
    max-width: 900px;
    display: none;
  }
  .analysis.visible { display: block; }

  .analysis-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: .1em;
    color: #f5c842;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 0 18px rgba(245,200,66,0.3);
  }

  .analysis-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .num-block {
    background: #141414;
    border-radius: 14px;
    border: 1px solid #222;
    overflow: hidden;
  }

  .num-block-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: #1a1a1a;
    border-bottom: 1px solid #222;
  }

  .num-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    min-width: 38px;
    text-align: center;
    line-height: 1;
  }

  .num-headline {
    font-weight: 700;
    font-size: 1rem;
    color: #eee;
  }

  .num-sectors-used {
    font-size: 0.75rem;
    color: #666;
    margin-top: 2px;
  }

  .interp-table {
    width: 100%;
    border-collapse: collapse;
  }

  .interp-table tr {
    border-bottom: 1px solid #1e1e1e;
  }
  .interp-table tr:last-child { border-bottom: none; }

  .interp-table td {
    padding: 10px 18px;
    font-size: 0.85rem;
    vertical-align: top;
    line-height: 1.5;
  }

  .interp-table td:first-child {
    width: 130px;
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #888;
    white-space: nowrap;
    padding-right: 8px;
  }

  .interp-table td:last-child {
    color: #ccc;
  }

  /* center block special */
  .num-block.center-block {
    border-color: rgba(245,200,66,0.3);
    background: #131107;
  }
  .num-block.center-block .num-block-header {
    background: #1c1a0a;
    border-bottom-color: rgba(245,200,66,0.15);
  }
  .num-block.center-block .interp-table td:last-child {
    color: #e8d98a;
  }

</style>
</head>
<body>
<div class="container">
  <h1>Нумерологічне Колесо</h1>

  <div class="input-panel">
    <label>Дата народження:</label>
    <input type="text" id="dob" placeholder="ДД.ММ.РРРР" maxlength="10" />
    <button class="btn-calc" onclick="calculate()">Розрахувати</button>
  </div>
  <div class="err-msg" id="errMsg"></div>

  <div class="main-row">
    <div class="wheel-wrap">
      <svg id="wheel" viewBox="-190 -190 380 380"></svg>
    </div>
    <div class="cards" id="cards"></div>
  </div>

  <div class="analysis" id="analysis">
    <div class="analysis-title">📖 Аналіз чисел</div>
    <div class="analysis-grid" id="analysisGrid"></div>
  </div>
</div>

<script>
/* ── helpers ──────────────────────────────────────────────── */
const digitSum = n => String(n).split('').reduce((a,c)=>a+Number(c),0);

// Reduce to 1-9 (never 0)
function reduce9(n) {
  while (n > 9 || n === 0) {
    n = digitSum(n);
    if (n === 0) n = 9;
  }
  return n;
}

function sumDigitsOf(n) {
  // one-pass digit sum (before reduction), used for formula display
  return String(n).split('').map(Number);
}

/* ── sector definitions ──────────────────────────────────── */
const SECTORS = [
  { name: 'Успіх в житті', key: 's1' },
  { name: "Зв'язок з родом", key: 's2' },
  { name: 'Фінанси',        key: 's3' },
  { name: 'Сімʼя',          key: 's4' },
  { name: 'Здоровʼя',       key: 's5' },
  { name: 'Місія душі',     key: 's6' },
];

const PALETTE = ['#e84040','#f5a623','#27ae60','#2980b9','#8e44ad','#16a085'];

/* ── wheel drawing ────────────────────────────────────────── */
const SVG_NS = 'http://www.w3.org/2000/svg';
const R = 172, INNER = 52, CX = 0, CY = 0;
const N = 6, SLICE = (2*Math.PI)/N, START = -Math.PI/2;

function polar(a, r){ return { x: CX+r*Math.cos(a), y: CY+r*Math.sin(a) }; }

function slicePath(i){
  const a0=START+i*SLICE, a1=a0+SLICE, lf=SLICE>Math.PI?1:0;
  const oA=polar(a0,R), oB=polar(a1,R), iA=polar(a0,INNER), iB=polar(a1,INNER);
  return `M${iA.x} ${iA.y} L${oA.x} ${oA.y} A${R} ${R} 0 ${lf} 1 ${oB.x} ${oB.y} L${iB.x} ${iB.y} A${INNER} ${INNER} 0 ${lf} 0 ${iA.x} ${iA.y}Z`;
}

function mkEl(tag, attrs){
  const el=document.createElementNS(SVG_NS,tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

function drawWheel(values, centerVal){
  const svg = document.getElementById('wheel');
  svg.innerHTML = '';

  values.forEach((val,i)=>{
    const color = PALETTE[i];
    const mid   = START+(i+0.5)*SLICE;

    // slice
    svg.appendChild(mkEl('path',{d:slicePath(i),fill:color,stroke:'#0d0d0d','stroke-width':'2'}));

    // separator line
    const lA=START+i*SLICE, lo=polar(lA,R), li=polar(lA,INNER);
    svg.appendChild(mkEl('line',{x1:li.x,y1:li.y,x2:lo.x,y2:lo.y,stroke:'#0d0d0d','stroke-width':'2.5'}));

    // sector number (outer)
    const sn=polar(mid,R-20);
    const snEl=mkEl('text',{x:sn.x,y:sn.y,'text-anchor':'middle','dominant-baseline':'central',
      'font-family':'Bebas Neue,sans-serif','font-size':'12',fill:'rgba(255,255,255,0.5)','letter-spacing':'1'});
    snEl.textContent=`№${i+1}`;
    svg.appendChild(snEl);

    // big value
    const vp=polar(mid,R*0.52);
    const vEl=mkEl('text',{x:vp.x,y:vp.y,'text-anchor':'middle','dominant-baseline':'central',
      'font-family':'Bebas Neue,sans-serif','font-size':'56',fill:'#fff',opacity:'0.95'});
    vEl.id=`sv${i}`;
    vEl.textContent=val;
    svg.appendChild(vEl);
  });

  // outer ring
  svg.appendChild(mkEl('circle',{cx:CX,cy:CY,r:R,fill:'none',stroke:'#f5c842','stroke-width':'3'}));

  // center cap background
  svg.appendChild(mkEl('circle',{cx:CX,cy:CY,r:INNER,fill:'#111',stroke:'#f5c842','stroke-width':'3'}));

  // center inner glow ring
  svg.appendChild(mkEl('circle',{cx:CX,cy:CY,r:INNER-4,fill:'none',stroke:'rgba(245,200,66,0.15)','stroke-width':'2'}));

  // center big number
  const cvDisp = (centerVal !== undefined && centerVal !== 0) ? centerVal : '·';
  const cvEl = mkEl('text',{x:CX,y:CY-10,'text-anchor':'middle','dominant-baseline':'central',
    'font-family':'Bebas Neue,sans-serif','font-size':'32',fill:'#f5c842'});
  cvEl.id = 'centerNum';
  cvEl.textContent = cvDisp;
  svg.appendChild(cvEl);

  // center label
  const lblEl = mkEl('text',{x:CX,y:CY+20,'text-anchor':'middle','dominant-baseline':'central',
    'font-family':'DM Sans,sans-serif','font-size':'7.5',fill:'rgba(245,200,66,0.7)','font-weight':'700',
    'letter-spacing':'0.5'});
  lblEl.id = 'centerLbl';
  lblEl.textContent = 'МІСІЯ СІМʼЇ';
  svg.appendChild(lblEl);
}

/* ── cards ──────────────────────────────────────────────── */
function buildCards(data, center){
  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';
  data.forEach((d,i)=>{
    const color = PALETTE[i];
    const card  = document.createElement('div');
    card.className = 'card active';
    card.style.setProperty('--card-color', color);
    card.innerHTML = `
      <div class="card-num">${i+1}</div>
      <div class="card-body">
        <div class="card-title">Сектор ${i+1}</div>
        <div class="card-name">${SECTORS[i].name}</div>
        <div class="card-formula">${d.formula}</div>
      </div>
      <div class="card-badge">${d.value}</div>`;
    wrap.appendChild(card);
  });

  // center card
  if(center){
    const card = document.createElement('div');
    card.className = 'card active';
    card.style.setProperty('--card-color', '#f5c842');
    card.style.borderColor = '#f5c842';
    card.style.background  = '#1c1a0f';
    card.style.boxShadow   = '0 0 22px -4px rgba(245,200,66,0.5)';
    card.innerHTML = `
      <div class="card-num" style="font-size:1.6rem">⊙</div>
      <div class="card-body">
        <div class="card-title" style="color:#f5c842aa">Центр</div>
        <div class="card-name" style="color:#f5c842">Місія стосовно сімʼї</div>
        <div class="card-formula">${center.formula}</div>
      </div>
      <div class="card-badge" style="color:#f5c842;opacity:1">${center.value}</div>`;
    wrap.appendChild(card);
  }
}

/* ── interpretations ─────────────────────────────────────── */

const ENERGY_DESC = {

  2: 'Двійка пов\'язана з партнерством (діловим, сімейним, дружнім). Дипломатичні, емпатичні люди, які вміють слухати й піклуватися. Мають містичні здібності, бачать більше за інших. Тіньова сторона — схильність до сумнівів і нерішучості.',
  3: 'Трійка — активна життєва позиція, оптимізм, допитливість, бажання навчатись. Мають силу переконання та інтелектуальну активність. Налаштовані на розширення й пізнання нового. Не мають права впадати у відчай або бездіяти.',

  5: 'П\'ятірка — свобода, постійний розвиток, подорожі. Не любить застою й одноманітності. Гнучкі, допитливі, легко ставляться до життя. Тіньова сторона — втеча від обов\'язків і недоведення справ до кінця.',
  6: 'Шістірка — сім\'я, турбота, гармонія, єдність. Прагне об\'єднати сім\'ю, примирити родичів, створити атмосферу любові. Мають дар любити і бути коханими. Тіньова сторона — надмірна жертовність.',
  7: 'Сімка — глибока енергія духовного пошуку, мудрості, пізнання. Де з\'являється — ставить особливі завдання. Дає здатність бачити знаки долі. Шлях починається через кризу, яка змушує шукати глибші відповіді.',
  8: 'Вісімка — сила, дар впливати на простір і притягувати ресурси. Дає шанси проявити себе в кар\'єрі, досягти матеріального успіху, влади та визнання. У якому секторі знаходиться — через той сектор людина заявляє про себе.',

// Sector-specific interpretations: sectorKey → number → text

  success: { // Сектор 1 — Успіх
    1: 'Лідер, що самостійно досягає цілей. Рід дає можливості для прояву.',

    5: 'Привносить зміни й рух у родову систему, руйнує застарілі сценарії.',
  },

    2: 'Фінансовий успіх через співпрацю, роботу в парі, спільноти. Потрібен партнер.',

    9: 'Не ставити матеріальне на перше місце. Для покращення становища — стати професіоналом своєї справи.',
  },
  family: { // Сектор 4 — Сімʼя
    4: 'Людина — керівник і опора сім\'ї. Встановлює правила, порядок, планує час.',

  },

const SECTOR_INTERP_KEY = ['success','рід','finance','family','health','soul'];
const SECTOR_ROW_LABEL  = ['Успіх','Рід','Фінанси','Сімʼя','Здоровʼя','Місія душі'];

/* ── build analysis panel ────────────────────────────────── */
function buildAnalysis(sectorValues, centerVal) {
  const panel = document.getElementById('analysis');
  const grid  = document.getElementById('analysisGrid');
  grid.innerHTML = '';

  // collect unique numbers → which sectors use them
  const numMap = {};
  sectorValues.forEach((v, i) => {
    if (!numMap[v]) numMap[v] = { sectors: [], isCenter: false };
    numMap[v].sectors.push(i);
  });
  if (!numMap[centerVal]) numMap[centerVal] = { sectors: [], isCenter: false };
  numMap[centerVal].isCenter = true;

  const sortedNums = Object.keys(numMap).map(Number).sort((a,b)=>a-b);

  sortedNums.forEach(num => {
    const info    = numMap[num];
    const color   = info.sectors.length > 0 ? PALETTE[info.sectors[0]] : '#f5c842';
    const isCenter = info.isCenter;

    const usedIn = [];
    info.sectors.forEach(i => usedIn.push(`Сектор ${i+1} · ${SECTOR_ROW_LABEL[i]}`));
    if (isCenter) usedIn.push('Центр · Місія сімʼї');

    // Build rows: general desc first, then per-sector
    const rows = [];

    // General energy description
    if (ENERGY_DESC[num]) {
      rows.push({ label: 'Загальне', text: ENERGY_DESC[num], highlight: true });
    }

    // Per-sector rows
    info.sectors.forEach(i => {
      const key = SECTOR_INTERP_KEY[i];
      if (key && INTERP[key] && INTERP[key][num]) {
        rows.push({ label: SECTOR_ROW_LABEL[i], text: INTERP[key][num] });
      }
    });

    // Center row
    if (isCenter && INTERP.center[num]) {
      rows.push({ label: 'Місія сімʼї', text: INTERP.center[num], gold: true });
    }

    const block = document.createElement('div');
    block.className = 'num-block' + (isCenter && info.sectors.length === 0 ? ' center-block' : '');

    const rowsHTML = rows.map(r => `
      <tr style="${r.highlight ? 'background:#181818' : ''}">
        <td style="color:${r.gold ? '#f5c842' : color}99">${r.label}</td>
        <td style="color:${r.gold ? '#e8d98a' : r.highlight ? '#bbb' : '#ccc'};
                   ${r.highlight ? 'font-style:italic' : ''}">${r.text}</td>
      </tr>`).join('');

    block.innerHTML = `
      <div class="num-block-header">
        <div class="num-badge" style="color:${color}">${num}</div>
        <div>
          <div class="num-headline" style="color:${color}">${ENERGY[num]}</div>
          <div class="num-sectors-used">Використовується: ${usedIn.join(' &nbsp;·&nbsp; ')}</div>
        </div>
      </div>
      <table class="interp-table"><tbody>${rowsHTML}</tbody></table>`;

    grid.appendChild(block);
  });

  panel.classList.add('visible');
}

/* ── calculation ────────────────────────────────────────── */
function calculate(){
  const raw = document.getElementById('dob').value.trim();
  const err = document.getElementById('errMsg');
  err.textContent = '';

  const m = raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(!m){ err.textContent='❌ Формат: ДД.ММ.РРРР'; return; }

  const dd=parseInt(m[1]), mo=parseInt(m[2]), yr=parseInt(m[3]);
  if(dd<1||dd>31||mo<1||mo>12){ err.textContent='❌ Невірна дата'; return; }

  // --- S1: день (sum digits, reduce to 1-9)
  const s1raw_digits = sumDigitsOf(dd);
  const s1raw = s1raw_digits.reduce((a,b)=>a+b,0);
  const s1 = reduce9(s1raw);
  const s1formula = s1raw_digits.join('+') + (s1raw>9 ? ` = ${digitSum(s1raw)} → ${s1}` : ` = ${s1}`);

  // --- S2: місяць
  const s2raw_digits = sumDigitsOf(mo);
  const s2raw = s2raw_digits.reduce((a,b)=>a+b,0);
  const s2 = reduce9(s2raw);
  const s2formula = s2raw_digits.join('+') + (s2raw>9 ? ` = ${digitSum(s2raw)} → ${s2}` : ` = ${s2}`);

  // --- S3: рік
  const s3raw_digits = sumDigitsOf(yr);
  const s3raw = s3raw_digits.reduce((a,b)=>a+b,0);
  const s3 = reduce9(s3raw);
  const s3_step = s3raw_digits.join('+') + ` = ${s3raw}`;
  const s3formula = s3raw>9 ? s3_step + ` → ${digitSum(s3raw)} → ${s3}` : s3_step + ` = ${s3}`;

  // --- S4: сума s1+s2+s3
  const s4raw = s1+s2+s3;
  const s4 = reduce9(s4raw);
  const s4formula = `${s1}+${s2}+${s3} = ${s4raw}` + (s4raw>9 ? ` → ${s4}` : '');

  // --- S5: сума s1..s4
  const s5raw = s1+s2+s3+s4;
  const s5 = reduce9(s5raw);
  const s5formula = `${s1}+${s2}+${s3}+${s4} = ${s5raw}` + (s5raw>9 ? ` → ${s5}` : '');

  // --- S6: сума s1..s5
  const s6raw = s1+s2+s3+s4+s5;
  const s6 = reduce9(s6raw);
  const s6formula = `${s1}+${s2}+${s3}+${s4}+${s5} = ${s6raw}` + (s6raw>9 ? ` → ${s6}` : '');

  // --- CENTER: Місія стосовно сімʼї — сума ВСІХ цифр дати (ДД.ММ.РРРР)
  const allDigits = `${m[1]}${m[2]}${m[3]}`.split('').map(Number);
  const scRaw = allDigits.reduce((a,b)=>a+b,0);
  const sc = reduce9(scRaw);
  const scFormula = allDigits.join('+') + ` = ${scRaw}` + (scRaw>9 ? ` → ${sc}` : '');

  const results = [
    { value: s1, formula: `День: ${dd} → ${s1formula}` },
    { value: s2, formula: `Місяць: ${mo} → ${s2formula}` },
    { value: s3, formula: `Рік: ${yr} → ${s3formula}` },
    { value: s4, formula: `С1+С2+С3 → ${s4formula}` },
    { value: s5, formula: `С1+С2+С3+С4 → ${s5formula}` },
    { value: s6, formula: `С1+С2+С3+С4+С5 → ${s6formula}` },
  ];

  drawWheel(results.map(r=>r.value), sc);
  buildCards(results, { value: sc, formula: `Всі цифри дати: ${scFormula}` });
  buildAnalysis(results.map(r=>r.value), sc);
}

/* ── format input automatically ─────────────────────────── */
document.getElementById('dob').addEventListener('input', function(){
  let v = this.value.replace(/[^\d.]/g,'');
  // auto-insert dots
  const digits = v.replace(/\./g,'');
  let formatted = '';
  for(let i=0;i<digits.length && i<8;i++){
    if(i===2||i===4) formatted+='.';
    formatted+=digits[i];
  }
  this.value = formatted;
});

document.getElementById('dob').addEventListener('keydown', function(e){
  if(e.key==='Enter') calculate();
});
