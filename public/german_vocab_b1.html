<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wichtige Wörter B1+</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#4ade80;--accent2:#60a5fa;--accent3:#f59e0b;--text:#e2e8f0;--muted:#64748b;--border:#2d3348;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",sans-serif;min-height:100vh;padding:20px 14px 60px;}
header{text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
header h1{font-family:"Playfair Display",serif;font-size:1.8rem;color:var(--accent);margin-bottom:4px;}
header p{color:var(--muted);font-size:.82rem;font-family:"IBM Plex Mono",monospace;}
.mode-bar{display:flex;gap:8px;justify-content:center;margin-bottom:22px;flex-wrap:wrap;}
.mode-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.8rem;font-family:"IBM Plex Mono",monospace;transition:all .2s;}
.mode-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500;}
.tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{white-space:nowrap;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:.75rem;font-family:"IBM Plex Mono",monospace;transition:all .2s;flex-shrink:0;}
.tab.active{background:var(--surface2);color:var(--accent2);border-color:var(--accent2);}
.stats{display:flex;gap:14px;margin-bottom:16px;font-size:.76rem;font-family:"IBM Plex Mono",monospace;color:var(--muted);flex-wrap:wrap;}
.stats span{color:var(--text);font-weight:500;}
/* Search */
.search-bar{margin-bottom:16px;}
.search-bar input{width:100%;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:"IBM Plex Mono",monospace;font-size:.85rem;outline:none;transition:border-color .2s;}
.search-bar input:focus{border-color:var(--accent2);}
.search-bar input::placeholder{color:var(--muted);}
/* Table */
.section-block{margin-bottom:28px;}
.section-title{font-family:"Playfair Display",serif;font-size:1.05rem;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.section-title .letter{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:.8rem;font-weight:700;font-family:"IBM Plex Mono",monospace;flex-shrink:0;color:#000;}
.word-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
@media(max-width:480px){.word-grid{grid-template-columns:1fr;}}
.word-row{display:flex;align-items:flex-start;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:all .15s;position:relative;}
.word-row:hover{border-color:var(--accent2);background:var(--surface2);}
.word-row.known{border-color:var(--accent)!important;}
.word-row.known::after{content:"✓";position:absolute;top:5px;right:7px;color:var(--accent);font-size:.72rem;}
.word-row .art{font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--accent3);text-transform:uppercase;flex-shrink:0;padding-top:2px;min-width:20px;}
.word-row .de{font-weight:500;font-size:.85rem;color:var(--text);flex:1;line-height:1.3;}
.word-row .pl{font-size:.7rem;color:var(--muted);font-family:"IBM Plex Mono",monospace;}
.word-row .ru-tr{font-size:.78rem;color:var(--accent);display:none;margin-top:4px;}
.word-row.show-tr .ru-tr{display:block;}
/* Flashcard */
#flashcard-mode{display:none;}
.flashcard-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.flashcard{width:100%;max-width:400px;min-height:200px;background:var(--surface);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:28px 22px;text-align:center;position:relative;transition:transform .15s,box-shadow .15s;user-select:none;}
.flashcard:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);}
.flashcard .fc-art{font-family:"IBM Plex Mono",monospace;font-size:.75rem;color:var(--accent3);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;}
.flashcard .fc-word{font-family:"Playfair Display",serif;font-size:1.6rem;color:var(--text);margin-bottom:7px;}
.flashcard .fc-pl{font-size:.8rem;color:var(--muted);font-family:"IBM Plex Mono",monospace;}
.flashcard .fc-tag{position:absolute;top:11px;right:12px;font-size:.65rem;padding:2px 7px;border-radius:10px;font-family:"IBM Plex Mono",monospace;}
.flashcard .fc-hint{font-size:.73rem;color:var(--muted);margin-top:14px;font-family:"IBM Plex Mono",monospace;}
.flashcard .fc-translation{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);width:100%;}
.flashcard.revealed .fc-translation{display:block;}
.flashcard.revealed .fc-hint{display:none;}
.fc-ru{font-size:1.15rem;color:var(--accent);font-weight:500;}
.card-nav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.nav-btn{padding:9px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:.82rem;font-family:"IBM Plex Mono",monospace;transition:all .15s;}
.nav-btn:hover{background:var(--surface2);}
.nav-btn.know{border-color:var(--accent);color:var(--accent);}
.nav-btn.know:hover{background:var(--accent);color:#000;}
.nav-btn.skip{border-color:#ef4444;color:#ef4444;}
.card-counter{font-family:"IBM Plex Mono",monospace;font-size:.82rem;color:var(--muted);min-width:70px;text-align:center;}
.progress-bar{width:100%;max-width:400px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.done-msg{text-align:center;padding:36px 20px;display:none;}
.done-msg h2{font-family:"Playfair Display",serif;color:var(--accent);font-size:1.7rem;margin-bottom:7px;}
.done-msg p{color:var(--muted);font-size:.85rem;}
.reset-btn{margin-top:14px;padding:9px 22px;background:var(--surface);border:1px solid var(--accent);color:var(--accent);border-radius:8px;cursor:pointer;font-family:"IBM Plex Mono",monospace;font-size:.82rem;}
</style>
</head>

<header>
  <h1>Wichtige Wörter B1+</h1>
  <p id="header-sub">B1+ · Загрузка...</p>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('table')">📋 Таблица</button>
  <button class="mode-btn" onclick="setMode('flashcard')">🃏 Карточки</button>
</div>
<div class="tabs" id="chapter-tabs"></div>

<!-- TABLE -->
<div id="table-mode">
  <div class="search-bar"><input type="text" id="searchInput" placeholder="Поиск слова..." oninput="filterWords()"></div>
  <div class="stats"><div>Изучено: <span id="knownCount">0</span> / <span id="totalCount">0</span></div><div>Нажмите на слово → перевод</div></div>
  <div id="tableContent"></div>
</div>

<!-- FLASHCARD -->
<div id="flashcard-mode">
  <div class="flashcard-wrap">
    <div class="stats" style="justify-content:center">
      <div>Осталось: <span id="fc-left">0</span></div>
      <div>Знаю: <span id="fc-known">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-progress" style="width:0%"></div></div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="fc-tag" id="fc-tag"></div>
      <div class="fc-art" id="fc-article"></div>
      <div class="fc-word" id="fc-word"></div>
      <div class="fc-pl" id="fc-plural"></div>
      <div class="fc-hint">👆 Нажмите, чтобы увидеть перевод</div>
      <div class="fc-translation"><div class="fc-ru" id="fc-ru"></div></div>
    </div>
    <div class="card-nav">
      <button class="nav-btn skip" onclick="nextCard(false)">✗ Не знаю</button>
      <div class="card-counter"><span id="fc-idx">1</span> / <span id="fc-total">0</span></div>
      <button class="nav-btn know" onclick="nextCard(true)">✓ Знаю</button>
    </div>
    <div class="done-msg" id="done-msg">
      <h2>Готово! 🎉</h2><p>Вы прошли все карточки</p>
      <button class="reset-btn" onclick="resetFlashcards()">Начать заново</button>
    </div>
  </div>
</div>

// ── State ────────────────────────────────────────────────────────────────────
let currentChapter = CHAPTERS[0];
let knownSet = new Set(JSON.parse(localStorage.getItem('b1_known') || '[]'));
let currentMode = 'table';
let fcQueue = [], fcIndex = 0, fcKnown = 0, showTranslation = false, searchQuery = '';

function saveKnown(){ try{localStorage.setItem('b1_known',JSON.stringify([...knownSet]));}catch(e){} }
function totalWords(){ return CHAPTERS.flatMap(ch=>ch.sections.flatMap(s=>s.words)).length; }
function chapterWords(ch){ return ch.sections.flatMap(s=>s.words.map(w=>({...w,section:s.id,sectionTitle:s.title,sectionColor:s.color}))); }

function renderChapterTabs(){
  document.getElementById('chapter-tabs').innerHTML = CHAPTERS.map(ch=>
    `<button class="tab ${ch.id===currentChapter.id?'active':''}" onclick="switchChapter('${ch.id}')">${ch.title}</button>`
  ).join('');
  document.getElementById('header-sub').textContent = `B1+ · ${totalWords()} слов · изучено ${knownSet.size}`;
}
function switchChapter(id){
  currentChapter = CHAPTERS.find(c=>c.id===id);
  searchQuery='';
  const inp=document.getElementById('searchInput');
  if(inp) inp.value='';
  renderChapterTabs();
  if(currentMode==='table') renderTable(); else initFlashcards();
}

function renderTable(){
  const q=searchQuery.toLowerCase();
  let html='';
  for(const sec of currentChapter.sections){
    const filtered=sec.words.filter(w=>!q||w.de.toLowerCase().includes(q)||w.ru.toLowerCase().includes(q));
    if(!filtered.length) continue;
    html+=`<div class="section-block">
      <div class="section-title" style="color:${sec.color}">
        <span class="letter" style="background:${sec.color}">${sec.id}</span>${sec.title}
      </div><div class="word-grid">`;
    for(const w of filtered){
      const key=currentChapter.id+':'+sec.id+':'+w.de;
      const known=knownSet.has(key);
      html+=`<div class="word-row ${known?'known':''}" onclick="toggleWord('${currentChapter.id}','${sec.id}','${w.de.replace(/'/g,"\'")}',this)">
        <div class="art">${w.art}</div>
        <div style="flex:1"><div class="de">${w.de}${w.pl?` <span class="pl">${w.pl}</span>`:''}</div>
        <div class="ru-tr">${w.ru}</div></div></div>`;
    }
    html+='</div></div>';
  }
  document.getElementById('tableContent').innerHTML=html;
  document.getElementById('knownCount').textContent=knownSet.size;
  document.getElementById('totalCount').textContent=totalWords();
}

function toggleWord(chId,secId,de,el){
  el.classList.toggle('show-tr');
  const key=chId+':'+secId+':'+de;
  if(el.classList.contains('show-tr')){
    knownSet.add(key); el.classList.add('known'); saveKnown();
    document.getElementById('knownCount').textContent=knownSet.size;
    document.getElementById('header-sub').textContent=`B1+ · ${totalWords()} слов · изучено ${knownSet.size}`;
  }
}
function filterWords(){ searchQuery=document.getElementById('searchInput').value; renderTable(); }

function initFlashcards(){
  fcQueue=[...chapterWords(currentChapter)].sort(()=>Math.random()-.5);
  fcIndex=0; fcKnown=0; showTranslation=false;
  document.getElementById('done-msg').style.display='none';
  document.getElementById('flashcard').style.display='flex';
  document.querySelectorAll('.card-nav .nav-btn').forEach(b=>b.style.display='');
  document.getElementById('fc-total').textContent=fcQueue.length;
  showCard();
}
function showCard(){
  if(fcIndex>=fcQueue.length){
    document.getElementById('done-msg').style.display='block';
    document.getElementById('flashcard').style.display='none';
    document.querySelectorAll('.card-nav .nav-btn').forEach(b=>b.style.display='none');
    return;
  }
  const w=fcQueue[fcIndex];
  document.getElementById('fc-article').textContent=w.art;
  document.getElementById('fc-word').textContent=w.de;
  document.getElementById('fc-plural').textContent=w.pl||'';;
  document.getElementById('fc-ru').textContent=w.ru;
  document.getElementById('fc-tag').textContent=w.section;
  document.getElementById('fc-tag').style.background=w.sectionColor+'22';
  document.getElementById('fc-tag').style.color=w.sectionColor;
  document.getElementById('fc-idx').textContent=fcIndex+1;
  document.getElementById('fc-left').textContent=fcQueue.length-fcIndex;
  document.getElementById('fc-known').textContent=fcKnown;
  document.getElementById('fc-progress').style.width=(fcIndex/fcQueue.length*100).toFixed(0)+'%';
  document.getElementById('flashcard').classList.remove('revealed');
  showTranslation=false;
}
function revealCard(){ if(showTranslation)return; showTranslation=true; document.getElementById('flashcard').classList.add('revealed'); }
function nextCard(known){
  if(!showTranslation){revealCard();return;}
  if(known){ fcKnown++; knownSet.add(currentChapter.id+':'+fcQueue[fcIndex].section+':'+fcQueue[fcIndex].de); saveKnown(); }
  fcIndex++; showCard();
}
function resetFlashcards(){ initFlashcards(); }

function setMode(mode){
  currentMode=mode;
  document.getElementById('table-mode').style.display=mode==='table'?'block':'none';
  document.getElementById('flashcard-mode').style.display=mode==='flashcard'?'block':'none';
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{ b.classList.toggle('active',(i===0&&mode==='table')||(i===1&&mode==='flashcard')); });
  if(mode==='flashcard') initFlashcards();
}

renderChapterTabs();
setMode('table');
renderTable();
