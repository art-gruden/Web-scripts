<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --der: #2563EB;
    --die: #DC2626;
    --das: #16A34A;
    --bg: #0F0E17;
    --surface: #1A1928;
    --card: #22213A;
    --text: #F0EEF9;
    --muted: #8B89A8;
    --border: #2E2C4A;
    --correct: #16A34A;
    --wrong: #DC2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(37,99,235,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(220,38,38,0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, #F0EEF9 30%, #8B89A8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .stats span { display: flex; align-items: center; gap: 6px; }
  .stats .val { color: var(--text); font-weight: 500; font-size: 1rem; }

  /* Mode tabs */
  .modes {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .mode-btn {
    padding: 8px 18px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all .2s;
  }
  .mode-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px 32px;
    width: 100%;
    max-width: 480px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color .3s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--der), var(--die), var(--das));
    border-radius: 24px 24px 0 0;
  }
  .card.correct { border-color: var(--correct); }
  .card.wrong { border-color: var(--wrong); }

  .category-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    margin-bottom: 20px;
  }

  .word-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 8vw, 4rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 8px;
    transition: all .3s;
  }
  .word-display .article-reveal {
    opacity: 0;
    transition: opacity .4s;
  }
  .word-display .article-reveal.show { opacity: 1; }

  .translation {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 8px;
    min-height: 1.2em;
  }

  .plural-hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 28px;
    min-height: 1.1em;
    opacity: 0.7;
  }

  /* Buttons */
  .article-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .art-btn {
    padding: 18px 12px;
    border: 2px solid transparent;
    border-radius: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .art-btn span {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    display: block;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 2px;
  }

  .art-btn.der { background: rgba(37,99,235,0.12); color: #60A5FA; border-color: rgba(37,99,235,0.3); }
  .art-btn.die { background: rgba(220,38,38,0.12); color: #F87171; border-color: rgba(220,38,38,0.3); }
  .art-btn.das { background: rgba(22,163,74,0.12); color: #4ADE80; border-color: rgba(22,163,74,0.3); }

  .art-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
  .art-btn:active { transform: translateY(0); }
  .art-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .art-btn.flash-correct { animation: flashCorrect .5s ease; }
  .art-btn.flash-wrong   { animation: flashWrong .5s ease; }

  @keyframes flashCorrect {
    0%,100% { transform: scale(1); }
    40% { transform: scale(1.08); filter: brightness(1.5); }
  }
  @keyframes flashWrong {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Feedback */
  .feedback {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    border-radius: 10px;
    transition: all .3s;
  }
  .feedback.correct { color: #4ADE80; background: rgba(22,163,74,0.1); }
  .feedback.wrong   { color: #F87171; background: rgba(220,38,38,0.1); }

  /* Next button */
  .next-btn {
    display: none;
    margin: 16px auto 0;
    padding: 14px 40px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 0.5px;
  }
  .next-btn:hover { transform: scale(1.04); }
  .next-btn.visible { display: block; }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 480px;
    margin-top: 20px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2563EB, #9333EA, #DC2626);
    border-radius: 4px;
    transition: width .4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 24px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.der { background: #2563EB; }
  .dot.die { background: #DC2626; }
  .dot.das { background: #16A34A; }

  /* Category filter */
  .cat-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
    max-width: 480px;
    justify-content: center;
  }
  .cat-tag {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all .15s;
  }
  .cat-tag.on {
    background: var(--surface);
    color: var(--text);
    border-color: var(--muted);
  }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .result-screen.show { display: block; }
  .result-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    margin-bottom: 8px;
  }
  .big-score {
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #60A5FA, #4ADE80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 16px 0;
  }
  .breakdown {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .bk-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 8px;
  }
  .bk-val { font-size: 1.8rem; font-weight: 700; font-family: 'Playfair Display', serif; }
  .bk-label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .restart-btn {
    padding: 14px 48px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    cursor: pointer;
    transition: transform .2s;
  }
  .restart-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<header>
  <h1>Artikel<br>Trainer</h1>
  <p>Definitiver Artikel · der · die · das</p>
</header>

<div class="stats">
  <span>✓ <span class="val" id="scoreVal">0</span></span>
  <span>✗ <span class="val" id="wrongVal">0</span></span>
  <span>🔥 <span class="val" id="streakVal">0</span></span>
</div>

<div class="modes">
  <button class="mode-btn active" data-mode="all" onclick="setMode(this,'all')">Все</button>
  <button class="mode-btn" data-mode="der" onclick="setMode(this,'der')">der</button>
  <button class="mode-btn" data-mode="die" onclick="setMode(this,'die')">die</button>
  <button class="mode-btn" data-mode="das" onclick="setMode(this,'das')">das</button>
</div>

<div class="cat-filter" id="catFilter"></div>

<div class="card" id="mainCard">
  <div class="category-badge" id="catBadge">Nomen</div>
  <div class="word-display" id="wordDisplay">
    <span class="article-reveal" id="articleReveal"></span>
    <span id="wordSpan">...</span>
  </div>
  <div class="translation" id="translationEl"></div>
  <div class="plural-hint" id="pluralEl"></div>

  <div class="article-buttons">
    <button class="art-btn der" onclick="answer('der')">der <span>Mask.</span></button>
    <button class="art-btn die" onclick="answer('die')">die <span>Fem.</span></button>
    <button class="art-btn das" onclick="answer('das')">das <span>Neutr.</span></button>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextWord()">Weiter →</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label">
    <span id="progLabel">0 / 0</span>
    <span id="accuracyLabel">–</span>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="dot der"></div>Maskulinum</div>
  <div class="legend-item"><div class="dot die"></div>Femininum</div>
  <div class="legend-item"><div class="dot das"></div>Neutrum</div>
</div>

<!-- Result screen -->
<div class="result-screen" id="resultScreen">
  <h2>Geschafft! 🎉</h2>
  <div class="big-score" id="finalScore">0%</div>
  <div class="breakdown">
    <div class="bk-item">
      <div class="bk-val" id="bkCorrect" style="color:#4ADE80">0</div>
      <div class="bk-label">Richtig</div>
    </div>
    <div class="bk-item">
      <div class="bk-val" id="bkWrong" style="color:#F87171">0</div>
      <div class="bk-label">Falsch</div>
    </div>
    <div class="bk-item">
      <div class="bk-val" id="bkStreak" style="color:#FACC15">0</div>
      <div class="bk-label">Max Streak</div>
    </div>
  </div>
  <button class="restart-btn" onclick="restartGame()">Neu starten</button>
</div>

<script>
const WORDS = [
  // Menschen & Familie
  { word: 'Mann', article: 'der', tr: 'мужчина', plural: 'Pl: die Männer', cat: 'Menschen' },
  { word: 'Frau', article: 'die', tr: 'женщина', plural: 'Pl: die Frauen', cat: 'Menschen' },
  { word: 'Kind', article: 'das', tr: 'ребёнок', plural: 'Pl: die Kinder', cat: 'Menschen' },
  { word: 'Mutter', article: 'die', tr: 'мать', plural: 'Pl: die Mütter', cat: 'Menschen' },
  { word: 'Vater', article: 'der', tr: 'отец', plural: 'Pl: die Väter', cat: 'Menschen' },
  { word: 'Bruder', article: 'der', tr: 'брат', plural: 'Pl: die Brüder', cat: 'Menschen' },
  { word: 'Schwester', article: 'die', tr: 'сестра', plural: 'Pl: die Schwestern', cat: 'Menschen' },
  { word: 'Freund', article: 'der', tr: 'друг', plural: 'Pl: die Freunde', cat: 'Menschen' },
  { word: 'Freundin', article: 'die', tr: 'подруга', plural: 'Pl: die Freundinnen', cat: 'Menschen' },
  { word: 'Arzt', article: 'der', tr: 'врач', plural: 'Pl: die Ärzte', cat: 'Menschen' },
  { word: 'Lehrerin', article: 'die', tr: 'учительница', plural: 'Pl: die Lehrerinnen', cat: 'Menschen' },
  { word: 'Schüler', article: 'der', tr: 'ученик', plural: 'Pl: die Schüler', cat: 'Menschen' },

  // Haus & Wohnung
  { word: 'Haus', article: 'das', tr: 'дом', plural: 'Pl: die Häuser', cat: 'Wohnen' },
  { word: 'Wohnung', article: 'die', tr: 'квартира', plural: 'Pl: die Wohnungen', cat: 'Wohnen' },
  { word: 'Zimmer', article: 'das', tr: 'комната', plural: 'Pl: die Zimmer', cat: 'Wohnen' },
  { word: 'Küche', article: 'die', tr: 'кухня', plural: 'Pl: die Küchen', cat: 'Wohnen' },
  { word: 'Tisch', article: 'der', tr: 'стол', plural: 'Pl: die Tische', cat: 'Wohnen' },
  { word: 'Stuhl', article: 'der', tr: 'стул', plural: 'Pl: die Stühle', cat: 'Wohnen' },
  { word: 'Fenster', article: 'das', tr: 'окно', plural: 'Pl: die Fenster', cat: 'Wohnen' },
  { word: 'Tür', article: 'die', tr: 'дверь', plural: 'Pl: die Türen', cat: 'Wohnen' },
  { word: 'Bett', article: 'das', tr: 'кровать', plural: 'Pl: die Betten', cat: 'Wohnen' },
  { word: 'Schrank', article: 'der', tr: 'шкаф', plural: 'Pl: die Schränke', cat: 'Wohnen' },

  // Essen & Trinken
  { word: 'Brot', article: 'das', tr: 'хлеб', plural: 'Pl: die Brote', cat: 'Essen' },
  { word: 'Milch', article: 'die', tr: 'молоко', plural: 'nur Singular', cat: 'Essen' },
  { word: 'Kaffee', article: 'der', tr: 'кофе', plural: 'Pl: die Kaffees', cat: 'Essen' },
  { word: 'Tee', article: 'der', tr: 'чай', plural: 'Pl: die Tees', cat: 'Essen' },
  { word: 'Wasser', article: 'das', tr: 'вода', plural: 'Pl: die Wasser', cat: 'Essen' },
  { word: 'Fleisch', article: 'das', tr: 'мясо', plural: 'nur Singular', cat: 'Essen' },
  { word: 'Suppe', article: 'die', tr: 'суп', plural: 'Pl: die Suppen', cat: 'Essen' },
  { word: 'Kuchen', article: 'der', tr: 'торт / пирог', plural: 'Pl: die Kuchen', cat: 'Essen' },
  { word: 'Ei', article: 'das', tr: 'яйцо', plural: 'Pl: die Eier', cat: 'Essen' },
  { word: 'Butter', article: 'die', tr: 'масло', plural: 'nur Singular', cat: 'Essen' },

  // Arbeit & Büro
  { word: 'Beruf', article: 'der', tr: 'профессия', plural: 'Pl: die Berufe', cat: 'Arbeit' },
  { word: 'Arbeit', article: 'die', tr: 'работа', plural: 'Pl: die Arbeiten', cat: 'Arbeit' },
  { word: 'Büro', article: 'das', tr: 'офис', plural: 'Pl: die Büros', cat: 'Arbeit' },
  { word: 'Computer', article: 'der', tr: 'компьютер', plural: 'Pl: die Computer', cat: 'Arbeit' },
  { word: 'E-Mail', article: 'die', tr: 'электронное письмо', plural: 'Pl: die E-Mails', cat: 'Arbeit' },
  { word: 'Besprechung', article: 'die', tr: 'совещание', plural: 'Pl: die Besprechungen', cat: 'Arbeit' },
  { word: 'Gehalt', article: 'das', tr: 'зарплата', plural: 'Pl: die Gehälter', cat: 'Arbeit' },
  { word: 'Kollege', article: 'der', tr: 'коллега (м)', plural: 'Pl: die Kollegen', cat: 'Arbeit' },
  { word: 'Stelle', article: 'die', tr: 'должность', plural: 'Pl: die Stellen', cat: 'Arbeit' },
  { word: 'Unternehmen', article: 'das', tr: 'предприятие', plural: 'Pl: die Unternehmen', cat: 'Arbeit' },

  // Natur & Wetter
  { word: 'Sonne', article: 'die', tr: 'солнце', plural: 'nur Singular', cat: 'Natur' },
  { word: 'Mond', article: 'der', tr: 'луна', plural: 'nur Singular', cat: 'Natur' },
  { word: 'Regen', article: 'der', tr: 'дождь', plural: 'nur Singular', cat: 'Natur' },
  { word: 'Schnee', article: 'der', tr: 'снег', plural: 'nur Singular', cat: 'Natur' },
  { word: 'Baum', article: 'der', tr: 'дерево', plural: 'Pl: die Bäume', cat: 'Natur' },
  { word: 'Blume', article: 'die', tr: 'цветок', plural: 'Pl: die Blumen', cat: 'Natur' },
  { word: 'Tier', article: 'das', tr: 'животное', plural: 'Pl: die Tiere', cat: 'Natur' },
  { word: 'Hund', article: 'der', tr: 'собака', plural: 'Pl: die Hunde', cat: 'Natur' },
  { word: 'Katze', article: 'die', tr: 'кошка', plural: 'Pl: die Katzen', cat: 'Natur' },
  { word: 'Berg', article: 'der', tr: 'гора', plural: 'Pl: die Berge', cat: 'Natur' },

  // Stadt & Verkehr
  { word: 'Stadt', article: 'die', tr: 'город', plural: 'Pl: die Städte', cat: 'Stadt' },
  { word: 'Straße', article: 'die', tr: 'улица', plural: 'Pl: die Straßen', cat: 'Stadt' },
  { word: 'Auto', article: 'das', tr: 'автомобиль', plural: 'Pl: die Autos', cat: 'Stadt' },
  { word: 'Zug', article: 'der', tr: 'поезд', plural: 'Pl: die Züge', cat: 'Stadt' },
  { word: 'Bus', article: 'der', tr: 'автобус', plural: 'Pl: die Busse', cat: 'Stadt' },
  { word: 'Bahnhof', article: 'der', tr: 'вокзал', plural: 'Pl: die Bahnhöfe', cat: 'Stadt' },
  { word: 'Flugzeug', article: 'das', tr: 'самолёт', plural: 'Pl: die Flugzeuge', cat: 'Stadt' },
  { word: 'Brücke', article: 'die', tr: 'мост', plural: 'Pl: die Brücken', cat: 'Stadt' },
  { word: 'Park', article: 'der', tr: 'парк', plural: 'Pl: die Parks', cat: 'Stadt' },
  { word: 'Markt', article: 'der', tr: 'рынок', plural: 'Pl: die Märkte', cat: 'Stadt' },

  // Bildung
  { word: 'Schule', article: 'die', tr: 'школа', plural: 'Pl: die Schulen', cat: 'Bildung' },
  { word: 'Buch', article: 'das', tr: 'книга', plural: 'Pl: die Bücher', cat: 'Bildung' },
  { word: 'Heft', article: 'das', tr: 'тетрадь', plural: 'Pl: die Hefte', cat: 'Bildung' },
  { word: 'Stift', article: 'der', tr: 'ручка / карандаш', plural: 'Pl: die Stifte', cat: 'Bildung' },
  { word: 'Sprache', article: 'die', tr: 'язык', plural: 'Pl: die Sprachen', cat: 'Bildung' },
  { word: 'Unterricht', article: 'der', tr: 'урок / занятие', plural: 'Pl: die Unterrichte', cat: 'Bildung' },
  { word: 'Wörterbuch', article: 'das', tr: 'словарь', plural: 'Pl: die Wörterbücher', cat: 'Bildung' },
  { word: 'Klasse', article: 'die', tr: 'класс', plural: 'Pl: die Klassen', cat: 'Bildung' },
];

let filteredWords = [];
let queue = [];
let current = null;
let score = 0;
let wrong = 0;
let streak = 0;
let maxStreak = 0;
let answered = false;
let activeMode = 'all';
let activeCategories = new Set();
const allCats = [...new Set(WORDS.map(w => w.cat))];

function initCategories() {
  const cf = document.getElementById('catFilter');
  cf.innerHTML = '';
  allCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tag on';
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.onclick = () => toggleCat(btn, cat);
    cf.appendChild(btn);
    activeCategories.add(cat);
  });
}

function toggleCat(btn, cat) {
  if (activeCategories.has(cat)) {
    if (activeCategories.size === 1) return; // min 1
    activeCategories.delete(cat);
    btn.classList.remove('on');
  } else {
    activeCategories.add(cat);
    btn.classList.add('on');
  }
  buildQueue();
}

function setMode(btn, mode) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeMode = mode;
  buildQueue();
}

function buildQueue() {
  filteredWords = WORDS.filter(w => {
    const catOk = activeCategories.has(w.cat);
    const modeOk = activeMode === 'all' || w.article === activeMode;
    return catOk && modeOk;
  });
  queue = shuffle([...filteredWords]);
  score = 0; wrong = 0; streak = 0; maxStreak = 0;
  updateStats();
  nextWord();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextWord() {
  answered = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('mainCard').className = 'card';
  document.getElementById('articleReveal').className = 'article-reveal';

  document.querySelectorAll('.art-btn').forEach(b => b.disabled = false);

  if (queue.length === 0) {
    // Round done
    if (filteredWords.length > 0) showResult();
    return;
  }
  current = queue.pop();
  document.getElementById('wordSpan').textContent = current.word;
  document.getElementById('translationEl').textContent = current.tr;
  document.getElementById('pluralEl').textContent = current.plural;
  document.getElementById('catBadge').textContent = current.cat;
  document.getElementById('articleReveal').textContent = current.article + ' ';

  updateProgress();
}

function answer(chosen) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.art-btn').forEach(b => b.disabled = true);

  const correct = chosen === current.article;
  const fb = document.getElementById('feedback');
  const card = document.getElementById('mainCard');

  // Reveal article
  document.getElementById('articleReveal').classList.add('show');

  if (correct) {
    score++;
    streak++;
    maxStreak = Math.max(maxStreak, streak);
    fb.className = 'feedback correct';
    fb.textContent = streak > 2 ? `✓ Richtig! 🔥 ${streak}x Streak` : '✓ Richtig!';
    card.className = 'card correct';
    document.querySelector(`.art-btn.${chosen}`).classList.add('flash-correct');
  } else {
    wrong++;
    streak = 0;
    fb.className = 'feedback wrong';
    fb.textContent = `✗ Falsch — es heißt: ${current.article} ${current.word}`;
    card.className = 'card wrong';
    document.querySelector(`.art-btn.${chosen}`).classList.add('flash-wrong');
    // Re-add wrong word to queue
    queue.unshift(current);
  }

  updateStats();
  updateProgress();
  document.getElementById('nextBtn').classList.add('visible');
}

function updateStats() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('wrongVal').textContent = wrong;
  document.getElementById('streakVal').textContent = streak;
}

function updateProgress() {
  const total = filteredWords.length;
  const done = total - queue.length - (answered && current ? 0 : 0);
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  const tried = score + wrong;
  const acc = tried > 0 ? Math.round((score / tried) * 100) + '%' : '–';
  document.getElementById('progLabel').textContent = `${score} / ${total}`;
  document.getElementById('accuracyLabel').textContent = 'Genauigkeit: ' + acc;
}

function showResult() {
  document.getElementById('mainCard').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.querySelector('.legend').style.display = 'none';

  const total = score + wrong;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('bkCorrect').textContent = score;
  document.getElementById('bkWrong').textContent = wrong;
  document.getElementById('bkStreak').textContent = maxStreak;
  document.getElementById('resultScreen').classList.add('show');
}

function restartGame() {
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('mainCard').style.display = '';
  document.querySelector('.progress-wrap').style.display = '';
  document.querySelector('.legend').style.display = '';
  buildQueue();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === '1' || e.key === 'd') answer('der');
  if (e.key === '2' || e.key === 'i') answer('die');
  if (e.key === '3' || e.key === 's') answer('das');
  if ((e.key === 'Enter' || e.key === ' ') && answered) nextWord();
});

// Init
initCategories();
buildQueue();
</script>
</body>
</html>
