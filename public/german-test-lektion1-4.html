<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Test — Lektionen 1–4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #5b6af0;
    --accent-soft: rgba(91,106,240,0.15);
    --green: #3ecf8e;
    --green-soft: rgba(62,207,142,0.12);
    --red: #f05b5b;
    --red-soft: rgba(240,91,91,0.12);
    --yellow: #f0c05b;
    --text: #e8eaf6;
    --muted: #7880a4;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Quiz container */
  .quiz-wrap { max-width: 720px; margin: 0 auto; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  .question-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .question-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 16px;
    color: var(--text);
  }

  .question-text .blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .options {
    display: grid;
    gap: 8px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 16px;
    border-radius: 8px;
    text-align: left;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .option-btn .opt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 18px;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green);
  }

  .option-btn.correct .opt-label { color: var(--green); }

  .option-btn.wrong {
    border-color: var(--red);
    background: var(--red-soft);
    color: var(--red);
  }

  .option-btn.wrong .opt-label { color: var(--red); }

  .option-btn:disabled { cursor: default; }

  .explanation {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-left: 3px solid var(--green);
    border-radius: 6px;
    font-size: 13px;
    color: var(--muted);
    display: none;
  }

  .explanation.show { display: block; }
  .explanation strong { color: var(--green); }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .result-screen.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    background: var(--accent-soft);
  }

  .score-num {
    font-size: 32px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    line-height: 1;
  }

  .score-total {
    font-size: 12px;
    color: var(--muted);
  }

  .result-grade {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-msg {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
  }

  .stat-badge .num {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-badge .lbl { color: var(--muted); font-size: 11px; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { opacity: 0.85; }

  /* Navigation */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    gap: 12px;
  }

  .btn-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.18s;
  }

  .btn-nav:hover { border-color: var(--accent); }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }

  .btn-finish {
    background: var(--green);
    border-color: var(--green);
    color: #0f1117;
  }

  .btn-finish:hover { opacity: 0.85; }

  .answered-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    margin: 2px;
    transition: background 0.2s;
  }

  .answered-dot.done { background: var(--green); }
  .answered-dot.wrong-dot { background: var(--red); }

  .dots-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
    margin-bottom: 20px;
  }
</style>
</head>

      ], answer: 0, exp: "ÖPNV = Öffentlicher Personennahverkehr (Bus, Straßenbahn, U-Bahn)" },
      { q: "Er bekommt ein _____ Gehalt.", opts: ["chaotische","angemessenes","durchschnittlicher","betriebliche"], answer: 1, exp: "ein angemessenes Gehalt — Nominativ, Neutrum (nach ein: starke Endung)" },
      { q: "Das _____ ist sehr hoch.", opts: ["Einweisung","Betriebsrente","Unfallrisiko"], answer: 2, exp: "das Unfallrisiko — Neutrum; ein hohes Unfallrisiko (kontextuell)" },
      { q: "Rauchen ist hier _____.", opts: ["untersagt","flexible","üblicher"], answer: 0, exp: "untersagt = verboten (offizieller, formeller Ausdruck)" },
      { q: "genehmigen = …?", opts: ["verbieten","verwenden","erlauben"], answer: 2, exp: "genehmigen = erlauben = offiziell zulassen (Synonym)" },
    ]
  }
];

let currentLektion = 0;
let currentQ = 0;
let answers = [];
let answered = [];

function loadLektion(idx) {
  currentLektion = idx;
  currentQ = 0;
  const total = TESTS[idx].questions.length;
  answers = new Array(total).fill(null);
  answered = new Array(total).fill(false);

  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderQuiz();
}

function renderQuiz() {
  const wrap = document.getElementById('quizWrap');
  const test = TESTS[currentLektion];
  const total = test.questions.length;

  wrap.innerHTML = `
    <div class="progress-label">
      <span>Frage ${currentQ + 1} von ${total}</span>
      <span id="scoreLabel">${countCorrect()} richtig</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:${((currentQ)/total)*100}%"></div></div>
    <div class="dots-row">${renderDots(total)}</div>
    ${renderQuestion(test.questions[currentQ], currentQ)}
    <div class="nav-row">
      <button class="btn-nav" onclick="navigate(-1)" ${currentQ === 0 ? 'disabled' : ''}>← Zurück</button>
      <button class="btn-nav ${currentQ === total - 1 ? 'btn-finish' : ''}" onclick="${currentQ === total - 1 ? 'showResult()' : 'navigate(1)'}">
        ${currentQ === total - 1 ? '✓ Ergebnis' : 'Weiter →'}
      </button>
    </div>
    <div class="result-screen" id="resultScreen"></div>
  `;
}

function renderDots(total) {
  return Array.from({length: total}, (_, i) => {
    let cls = 'answered-dot';
    if (answered[i]) cls += answers[i] === TESTS[currentLektion].questions[i].answer ? ' done' : ' wrong-dot';
    return `<span class="${cls}"></span>`;
  }).join('');
}

function renderQuestion(q, idx) {
  const opts = q.opts.map((o, i) => {
    let cls = 'option-btn';
    if (answered[idx]) {
      if (i === q.answer) cls += ' correct';
      else if (i === answers[idx] && answers[idx] !== q.answer) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})" ${answered[idx] ? 'disabled' : ''}>
      <span class="opt-label">${String.fromCharCode(97+i)})</span> ${o}
    </button>`;
  }).join('');

  const expShow = answered[idx] ? 'show' : '';

  return `<div class="question-card">
    <div class="question-num">FRAGE ${idx + 1}</div>
    <div class="question-text">${q.q}</div>
    <div class="options">${opts}</div>
    <div class="explanation ${expShow}"><strong>✓</strong> ${q.exp}</div>
  </div>`;
}

function selectAnswer(optIdx) {
  if (answered[currentQ]) return;
  answers[currentQ] = optIdx;
  answered[currentQ] = true;
  renderQuiz();
}

function navigate(dir) {
  currentQ = Math.max(0, Math.min(TESTS[currentLektion].questions.length - 1, currentQ + dir));
  renderQuiz();
}

function countCorrect() {
  return TESTS[currentLektion].questions.reduce((acc, q, i) => acc + (answers[i] === q.answer ? 1 : 0), 0);
}

function showResult() {
  const test = TESTS[currentLektion];
  const total = test.questions.length;
  const correct = countCorrect();
  const pct = Math.round((correct / total) * 100);

  let grade, msg;
  if (pct >= 90) { grade = "🏆 Ausgezeichnet!"; msg = "Sehr gutes Ergebnis! Der Stoff wurde sehr gut gelernt."; }
  else if (pct >= 75) { grade = "👍 Gut"; msg = "Gutes Ergebnis. Noch ein bisschen Übung und es wird ausgezeichnet!"; }
  else if (pct >= 55) { grade = "📚 Befriedigend"; msg = "Es lohnt sich, den Stoff zu wiederholen und den Test nochmal zu machen."; }
  else { grade = "🔄 Wiederholung nötig"; msg = "Wir empfehlen, das Thema noch einmal zu erarbeiten."; }

  const wrong = total - correct;

  document.getElementById('quizWrap').innerHTML = `
    <div class="result-screen show">
      <div class="score-circle">
        <div class="score-num">${correct}</div>
        <div class="score-total">von ${total}</div>
      </div>
      <div class="result-grade">${grade}</div>
      <div class="result-msg">${msg}</div>
      <div class="stats-row">
        <div class="stat-badge"><div class="num" style="color:var(--green)">${correct}</div><div class="lbl">Richtig</div></div>
        <div class="stat-badge"><div class="num" style="color:var(--red)">${wrong}</div><div class="lbl">Fehler</div></div>
        <div class="stat-badge"><div class="num" style="color:var(--accent)">${pct}%</div><div class="lbl">Ergebnis</div></div>
      </div>
      <button class="btn-primary" onclick="loadLektion(${currentLektion})">↺ Nochmal versuchen</button>
    </div>
  `;
}

// Init
loadLektion(0);
</script>
</body>
</html>
