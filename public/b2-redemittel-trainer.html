<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Redemittel für Sprechen — Tренажер</title>
<style>
  :root{
    --bg:#0f1115;
    --card:#181b22;
    --card-hover:#1f232c;
    --border:#2a2e38;
    --text:#e8e9ec;
    --muted:#9aa0ab;
    --accent:#7c9eff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:60px;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg,#0f1115 85%,transparent);
    padding:18px 16px 10px;
    backdrop-filter:blur(6px);
  }
  h1{
    font-size:1.35rem;
    margin:0 0 4px;
    background:linear-gradient(90deg,#7c9eff,#c07cff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .sub{ color:var(--muted); font-size:.85rem; margin-bottom:12px;}
  .controls{
    display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;
  }
  input[type=text]{
    flex:1; min-width:150px;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:10px;
    font-size:.95rem;
  }
  input[type=text]:focus{outline:none; border-color:var(--accent);}
  button.mode-btn{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 14px;
    border-radius:10px;
    font-size:.85rem;
    cursor:pointer;
  }
  button.mode-btn.active{
    background:var(--accent);
    color:#0f1115;
    border-color:var(--accent);
    font-weight:600;
  }
  main{ padding:6px 16px 20px; }
  .count{ color:var(--muted); font-size:.8rem; margin:6px 0 14px; }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-left:4px solid var(--accent-color,#7c9eff);
    border-radius:12px;
    margin-bottom:10px;
    overflow:hidden;
    transition:background .15s;
  }
  .card-head{
    display:flex; align-items:center; gap:10px;
    padding:14px 14px;
    cursor:pointer;
  }
  .card-head:active{ background:var(--card-hover); }
  .num{
    flex:0 0 auto;
    width:28px; height:28px;
    border-radius:8px;
    background:var(--accent-color,#7c9eff);
    color:#0f1115;
    font-weight:700;
    font-size:.8rem;
    display:flex; align-items:center; justify-content:center;
  }
  .titles{ flex:1; min-width:0; }
  .de-title{ font-weight:600; font-size:.95rem; }
  .ua-title{ color:var(--muted); font-size:.78rem; margin-top:1px; }
  .chevron{
    color:var(--muted);
    transition:transform .2s;
    flex:0 0 auto;
    font-size:.8rem;
  }
  .card.open .chevron{ transform:rotate(90deg); }
  .card-body{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
    padding:0 14px;
  }
  .card.open .card-body{
    max-height:900px;
    padding:0 14px 16px;
  }
  ul.phrases{ margin:4px 0 10px; padding-left:18px; }
  ul.phrases li{ margin-bottom:6px; font-size:.92rem; line-height:1.4; }
  .beispiel{
    background:#11141a;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-size:.86rem;
    color:#c9cdd6;
  }
  .beispiel b{ color:var(--accent); font-weight:600; }

  /* practice mode */
  .practice-box{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:22px 18px;
    text-align:center;
    margin-top:8px;
  }
  .practice-num{
    display:inline-block;
    background:var(--accent-color,#7c9eff);
    color:#0f1115;
    font-weight:700;
    font-size:.8rem;
    padding:2px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .practice-title{ font-size:1.15rem; font-weight:700; }
  .practice-ua{ color:var(--muted); font-size:.85rem; margin-top:4px; margin-bottom:18px;}
  .practice-answer{ text-align:left; display:none; }
  .practice-answer.show{ display:block; }
  .practice-actions{
    display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap;
  }
  .practice-actions button{
    background:var(--accent);
    color:#0f1115;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
    font-size:.9rem;
    cursor:pointer;
  }
  .practice-actions button.secondary{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
  }
  .progress{ color:var(--muted); font-size:.8rem; margin-top:14px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>

<header>
  <h1>🇩🇪 B2 Redemittel für Sprechen</h1>
  <div class="sub">40 категорій · довідник + тренажер для усного іспиту</div>
  <div class="controls">
    <input type="text" id="search" placeholder="Пошук: категорія або фраза...">
    <button class="mode-btn active" id="btnList">Список</button>
    <button class="mode-btn" id="btnPractice">Тренування</button>
  </div>
</header>

<main>
  <div class="count" id="count"></div>
  <div id="listView"></div>

  <div id="practiceView" class="hidden">
    <div class="practice-box">
      <div class="practice-num" id="pNum">1</div>
      <div class="practice-title" id="pTitleDe">...</div>
      <div class="practice-ua" id="pTitleUa">...</div>

      <div class="practice-answer" id="pAnswer">
        <ul class="phrases" id="pPhrases"></ul>
        <div class="beispiel" id="pBeispiel"></div>
      </div>

      <div class="practice-actions">
        <button id="showAnswerBtn">Показати відповідь</button>
        <button class="secondary" id="nextBtn">Наступна ➜</button>
      </div>
      <div class="progress" id="pProgress"></div>
    </div>
  </div>
</main>

const listView = document.getElementById('listView');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');

function renderList(filter=""){
  const f = filter.trim().toLowerCase();
  listView.innerHTML = "";
  let shown = 0;
  data.forEach((item,i)=>{
    const haystack = (item.de+" "+item.en+" "+item.ua+" "+item.phrases.join(" ")+" "+item.beispiel).toLowerCase();
    if(f && !haystack.includes(f)) return;
    shown++;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent-color', palette[i % palette.length]);
    card.innerHTML = `
      <div class="card-head">
        <div class="num">${item.n}</div>
        <div class="titles">
          <div class="de-title">${item.de}</div>
          <div class="ua-title">${item.ua} · ${item.en}</div>
        </div>
        <div class="chevron">▸</div>
      </div>
      <div class="card-body">
        <ul class="phrases">${item.phrases.map(p=>`<li>${p}</li>`).join('')}</ul>
        ${item.beispiel ? `<div class="beispiel"><b>Beispiel:</b> ${item.beispiel}</div>` : ''}
      </div>
    `;
    card.querySelector('.card-head').addEventListener('click', ()=>{
      card.classList.toggle('open');
    });
    listView.appendChild(card);
  });
  countEl.textContent = f ? `Знайдено: ${shown} з 40` : `Усього категорій: 40`;
}
renderList();
searchEl.addEventListener('input', e=> renderList(e.target.value));

// ----- practice mode -----
const btnList = document.getElementById('btnList');
const btnPractice = document.getElementById('btnPractice');
const listViewWrap = document.getElementById('listView');
const practiceView = document.getElementById('practiceView');
const controlsCount = document.getElementById('count');

let order = [];
let idx = -1;
let practicedSet = new Set();

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startPractice(){
  order = shuffle(data.map((_,i)=>i));
  idx = -1;
  practicedSet.clear();
  nextCard();
}

function nextCard(){
  idx++;
  if(idx >= order.length){
    order = shuffle(order);
    idx = 0;
  }
  const item = data[order[idx]];
  practicedSet.add(item.n);
  document.getElementById('pNum').textContent = item.n;
  document.getElementById('pNum').style.background = palette[order[idx]%palette.length];
  document.getElementById('pTitleDe').textContent = item.de;
  document.getElementById('pTitleUa').textContent = item.ua + " · " + item.en;
  document.getElementById('pPhrases').innerHTML = item.phrases.map(p=>`<li>${p}</li>`).join('');
  document.getElementById('pBeispiel').innerHTML = item.beispiel ? `<b>Beispiel:</b> ${item.beispiel}` : '';
  document.getElementById('pBeispiel').style.display = item.beispiel ? 'block' : 'none';
  document.getElementById('pAnswer').classList.remove('show');
  document.getElementById('pProgress').textContent = `Опрацьовано: ${practicedSet.size} / 40`;
}

document.getElementById('showAnswerBtn').addEventListener('click', ()=>{
  document.getElementById('pAnswer').classList.add('show');
});
document.getElementById('nextBtn').addEventListener('click', nextCard);

btnList.addEventListener('click', ()=>{
  btnList.classList.add('active');
  btnPractice.classList.remove('active');
  listViewWrap.classList.remove('hidden');
  practiceView.classList.add('hidden');
  controlsCount.classList.remove('hidden');
  searchEl.classList.remove('hidden');
});
btnPractice.addEventListener('click', ()=>{
  btnPractice.classList.add('active');
  btnList.classList.remove('active');
  listViewWrap.classList.add('hidden');
  practiceView.classList.remove('hidden');
  controlsCount.classList.add('hidden');
  searchEl.classList.add('hidden');
  startPractice();
});
</script>
</body>
</html>
