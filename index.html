<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wichtige Wörter — B2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d3348;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Mode toggle */
  .mode-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .mode-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* Section tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--accent2);
    border-color: var(--accent2);
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    font-size: 0.78rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .stat span { color: var(--text); font-weight: 500; }

  /* FLASHCARD mode */
  #flashcard-mode { display: none; }

  .flashcard-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .flashcard {
    width: 100%;
    max-width: 420px;
    min-height: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 32px 24px;
    text-align: center;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .flashcard:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

  .flashcard .article {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent3);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .flashcard .word {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--text);
    margin-bottom: 8px;
  }

  .flashcard .plural {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 12px;
  }

  .flashcard .section-tag {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .flashcard .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 16px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .flashcard .translation {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    width: 100%;
  }

  .flashcard.revealed .translation { display: block; }
  .flashcard.revealed .hint { display: none; }

  .translation .ru {
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: 500;
  }

  .translation .note {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .card-nav {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.know { border-color: var(--accent); color: var(--accent); }
  .nav-btn.know:hover { background: var(--accent); color: #000; }
  .nav-btn.skip { border-color: #ef4444; color: #ef4444; }

  .card-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    min-width: 80px;
    text-align: center;
  }

  /* TABLE mode */
  #table-mode { display: none; }

  .section-block {
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent2);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title .letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    background: var(--accent2);
    color: #000;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }

  .word-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  @media (max-width: 480px) {
    .word-grid { grid-template-columns: 1fr; }
  }

  .word-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .word-row:hover { border-color: var(--accent2); background: var(--surface2); }
  .word-row.known { border-color: var(--accent) !important; }
  .word-row.known::after {
    content: '✓';
    position: absolute;
    top: 6px;
    right: 8px;
    color: var(--accent);
    font-size: 0.75rem;
  }

  .word-row .art {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent3);
    text-transform: uppercase;
    flex-shrink: 0;
    padding-top: 2px;
    min-width: 22px;
  }

  .word-row .de {
    font-weight: 500;
    font-size: 0.88rem;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }

  .word-row .pl {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .word-row .ru-tr {
    font-size: 0.8rem;
    color: var(--accent);
    display: none;
    margin-top: 4px;
  }

  .word-row.show-tr .ru-tr { display: block; }

  /* Search */
  .search-bar {
    margin-bottom: 20px;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent2); }
  .search-bar input::placeholder { color: var(--muted); }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    max-width: 420px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .done-msg {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }

  .done-msg h2 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 1.8rem; margin-bottom: 8px; }
  .done-msg p { color: var(--muted); font-size: 0.88rem; }

  .reset-btn {
    margin-top: 16px;
    padding: 10px 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }
</style>
</head>

<header>
  <h1>Wichtige Wörter</h1>
  <p id="header-sub">B2 · Загрузка...</p>
</header>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('table')">📋 Таблица</button>
  <button class="mode-btn" onclick="setMode('flashcard')">🃏 Карточки</button>
</div>

<div class="tabs" id="chapter-tabs"></div>

<!-- TABLE MODE -->
<div id="table-mode">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Поиск слова..." oninput="filterWords()">
  </div>
  <div class="stats">
    <div>Изучено: <span id="knownCount">0</span> / <span id="totalCount">0</span></div>
    <div>Нажмите на слово → перевод</div>
  </div>
  <div id="tableContent"></div>
</div>

<!-- FLASHCARD MODE -->
<div id="flashcard-mode">
  <div class="flashcard-wrap">
    <div class="stats" style="justify-content:center">
      <div>Осталось: <span id="fc-left">0</span></div>
      <div>Знаю: <span id="fc-known">0</span></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="fc-progress" style="width:0%"></div>
    </div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="section-tag" id="fc-tag"></div>
      <div class="article" id="fc-article"></div>
      <div class="word" id="fc-word"></div>
      <div class="plural" id="fc-plural"></div>
      <div class="hint">👆 Нажмите, чтобы увидеть перевод</div>
      <div class="translation">
        <div class="ru" id="fc-ru"></div>
        <div class="note" id="fc-note"></div>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn skip" onclick="nextCard(false)">✗ Не знаю</button>
      <div class="card-counter"><span id="fc-idx">1</span> / <span id="fc-total">0</span></div>
      <button class="nav-btn know" onclick="nextCard(true)">✓ Знаю</button>
    </div>
    <div class="done-msg" id="done-msg">
      <h2>Готово! 🎉</h2>
      <p>Вы прошли все карточки</p>
      <button class="reset-btn" onclick="resetFlashcards()">Начать заново</button>
    </div>
  </div>
</div>

// ---- State ----
let currentChapter = CHAPTERS[0];
let knownSet = new Set(JSON.parse(localStorage.getItem('known') || '[]'));
let currentMode = 'table';
let fcQueue = [];
let fcIndex = 0;
let fcKnown = 0;
let showTranslation = false;
let searchQuery = '';

function saveKnown() {
  try { localStorage.setItem('known', JSON.stringify([...knownSet])); } catch(e){}
}

function totalWords() {
  return CHAPTERS.flatMap(ch => ch.sections.flatMap(s => s.words)).length;
}

function chapterWords(ch) {
  return ch.sections.flatMap(s => s.words.map(w => ({ ...w, section: s.id, sectionTitle: s.title, sectionColor: s.color })));
}

// ---- Chapter tabs ----
function renderChapterTabs() {
  const el = document.getElementById('chapter-tabs');
  el.innerHTML = CHAPTERS.map(ch =>
    `<button class="tab ${ch.id === currentChapter.id ? 'active' : ''}" onclick="switchChapter('${ch.id}')">${ch.title}</button>`
  ).join('');
  const total = totalWords();
  document.getElementById('header-sub').textContent = `B2 · ${total} слов · изучено ${knownSet.size}`;
}

function switchChapter(id) {
  currentChapter = CHAPTERS.find(c => c.id === id);
  searchQuery = '';
  const inp = document.getElementById('searchInput');
  if (inp) inp.value = '';
  renderChapterTabs();
  if (currentMode === 'table') renderTable();
  else initFlashcards();
}

// ---- TABLE MODE ----
function renderTable() {
  const q = searchQuery.toLowerCase();
  let html = '';
  for (const sec of currentChapter.sections) {
    const filtered = sec.words.filter(w =>
      !q || w.de.toLowerCase().includes(q) || w.ru.toLowerCase().includes(q)
    );
    if (!filtered.length) continue;
    html += `<div class="section-block">
      <div class="section-title" style="color:${sec.color}">
        <span class="letter" style="background:${sec.color}">${sec.id}</span>
        ${sec.title}
      </div>
      <div class="word-grid">`;
    for (const w of filtered) {
      const key = currentChapter.id + ':' + sec.id + ':' + w.de;
      const known = knownSet.has(key);
      html += `<div class="word-row ${known ? 'known' : ''}" onclick="toggleWord('${currentChapter.id}','${sec.id}','${w.de.replace(/'/g,"\\'")}',this)">
        <div class="art">${w.art}</div>
        <div style="flex:1">
          <div class="de">${w.de}${w.pl ? ` <span class="pl">${w.pl}</span>` : ''}</div>
          <div class="ru-tr">${w.ru}</div>
        </div>
      </div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('tableContent').innerHTML = html;
  document.getElementById('knownCount').textContent = knownSet.size;
  document.getElementById('totalCount').textContent = totalWords();
}

function toggleWord(chId, secId, de, el) {
  el.classList.toggle('show-tr');
  const key = chId + ':' + secId + ':' + de;
  if (el.classList.contains('show-tr')) {
    knownSet.add(key);
    el.classList.add('known');
    saveKnown();
    document.getElementById('knownCount').textContent = knownSet.size;
    document.getElementById('header-sub').textContent = `B2 · ${totalWords()} слов · изучено ${knownSet.size}`;
  }
}

function filterWords() {
  searchQuery = document.getElementById('searchInput').value;
  renderTable();
}

// ---- FLASHCARD MODE ----
function initFlashcards() {
  fcQueue = chapterWords(currentChapter).sort(() => Math.random() - 0.5);
  fcIndex = 0;
  fcKnown = 0;
  showTranslation = false;
  document.getElementById('done-msg').style.display = 'none';
  document.getElementById('flashcard').style.display = 'flex';
  document.querySelectorAll('.card-nav .nav-btn').forEach(b => b.style.display = '');
  document.getElementById('fc-total').textContent = fcQueue.length;
  showCard();
}

function showCard() {
  if (fcIndex >= fcQueue.length) {
    document.getElementById('done-msg').style.display = 'block';
    document.getElementById('flashcard').style.display = 'none';
    document.querySelectorAll('.card-nav .nav-btn').forEach(b => b.style.display = 'none');
    return;
  }
  const w = fcQueue[fcIndex];
  document.getElementById('fc-article').textContent = w.art;
  document.getElementById('fc-word').textContent = w.de;
  document.getElementById('fc-plural').textContent = w.pl ? w.pl : '';
  document.getElementById('fc-ru').textContent = w.ru;
  document.getElementById('fc-note').textContent = '';
  document.getElementById('fc-tag').textContent = w.section;
  document.getElementById('fc-tag').style.background = w.sectionColor + '22';
  document.getElementById('fc-tag').style.color = w.sectionColor;
  document.getElementById('fc-idx').textContent = fcIndex + 1;
  document.getElementById('fc-left').textContent = fcQueue.length - fcIndex;
  document.getElementById('fc-known').textContent = fcKnown;
  const pct = (fcIndex / fcQueue.length * 100).toFixed(0);
  document.getElementById('fc-progress').style.width = pct + '%';
  const card = document.getElementById('flashcard');
  card.classList.remove('revealed');
  showTranslation = false;
}

function revealCard() {
  if (showTranslation) return;
  showTranslation = true;
  document.getElementById('flashcard').classList.add('revealed');
}

function nextCard(known) {
  if (!showTranslation) { revealCard(); return; }
  if (known) {
    fcKnown++;
    const w = fcQueue[fcIndex];
    knownSet.add(currentChapter.id + ':' + w.section + ':' + w.de);
    saveKnown();
  }
  fcIndex++;
  showCard();
}

function resetFlashcards() {
  initFlashcards();
}

// ---- Mode switch ----
function setMode(mode) {
  currentMode = mode;
  document.getElementById('table-mode').style.display = mode === 'table' ? 'block' : 'none';
  document.getElementById('flashcard-mode').style.display = mode === 'flashcard' ? 'block' : 'none';
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && mode === 'table') || (i === 1 && mode === 'flashcard'));
  });
  if (mode === 'flashcard') initFlashcards();
}

// Init
renderChapterTabs();
setMode('table');
renderTable();
